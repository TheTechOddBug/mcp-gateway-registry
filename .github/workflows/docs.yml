name: Build and Deploy Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'landing/**'
      - 'scripts/build_landing_page.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'landing/**'
      - 'scripts/build_landing_page.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  readme-length:
    name: "README length budget"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Maximum allowed README.md length. The README is the highest-traffic page and
      # regrows without a hard limit. Feature announcements belong in
      # docs/overview/feature-release-highlights.md (top 3 mirrored in the README),
      # not inline. Adjust this number deliberately if the structure genuinely changes.
      README_MAX_LINES: "350"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Enforce README length budget
        run: |
          lines=$(wc -l < README.md)
          echo "README.md is ${lines} lines (budget: ${README_MAX_LINES})."
          if [ "${lines}" -gt "${README_MAX_LINES}" ]; then
            echo "::error file=README.md::README.md is ${lines} lines, over the ${README_MAX_LINES}-line budget."
            echo "Move detail into docs/ and link out. Feature announcements go to"
            echo "docs/overview/feature-release-highlights.md (top 3 mirrored in the README)."
            echo "See docs/design/theory-of-the-system.md#6-how-to-change-this-system-without-breaking-its-theory."
            exit 1
          fi

  build:
    name: "Build Landing Page"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "latest"

      - name: Install dependencies
        # Install from the committed lockfile so the docs build is reproducible
        # and does not resolve newer releases.
        run: |
          uv sync --frozen --extra docs --no-dev

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build landing page
        run: |
          uv run python scripts/build_landing_page.py --out site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy:
    name: "Deploy to GitHub Pages"
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
