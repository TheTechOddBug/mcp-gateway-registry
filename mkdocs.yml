site_name: MCP Gateway & Registry
site_description: Enterprise-grade MCP server registry and reverse proxy with OAuth authentication and fine-grained access control
site_author: Agentic Community
site_url: https://agentic-community.github.io/mcp-gateway-registry/

# Repository
repo_name: agentic-community/mcp-gateway-registry
repo_url: https://github.com/agentic-community/mcp-gateway-registry

# Copyright
copyright: Copyright &copy; 2025 Agentic Community

# Configuration
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  logo: img/mcp_gateway_horizontal_white_logo.png
  favicon: img/registry.png

# Plugins
plugins:
  - search:
      lang: en
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: agentic-community
      repo: mcp-gateway-registry
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation is generated automatically from the docs/ tree by the awesome-pages plugin.
# Ordering and section titles are controlled by `.pages` files (docs/.pages and per-folder).
# This means a new docs/*.md page appears in the nav on the next build with no mkdocs.yml edit.

# Do not publish contributor-facing readmes that would collide with a section index.
exclude_docs: |
  README.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/agentic-community/mcp-gateway-registry
    - icon: fontawesome/brands/discord
      link: https://discord.gg/agentic-community
  generator: false

# Analytics (optional - add your Google Analytics ID if needed)
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
