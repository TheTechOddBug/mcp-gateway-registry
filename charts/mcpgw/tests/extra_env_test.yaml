suite: extraEnv and extraEnvFrom
templates:
  - deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders without extraEnv by default
    set:
      app.secretKey: test-key
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOST
            value: 0.0.0.0

  - it: appends extraEnv entries after chart-managed env vars
    set:
      app.secretKey: test-key
      extraEnv:
        - name: MY_FLAG
          value: "on"
        - name: MY_SECRET_VAR
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: my-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_FLAG
            value: "on"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_SECRET_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: my-key
      # Order: chart-managed env vars come first, then user extraEnv entries.
      # Indices shift whenever a chart-managed env var is inserted; update
      # these assertions AND the NOTE block whenever the set changes.
      # NOTE: assumes no github* fields set (default values), so only
      # NODE_NAME, HOST and the unconditional Issue #1122 OTel block render
      # before extraEnv.
      # Index map:
      #   env[0] = NODE_NAME
      #   env[1] = HOST
      #   env[2] = METRICS_LEGACY_HTTP_POST  (Issue #1122)
      #   env[3] = OTEL_METRIC_EXPORT_INTERVAL_MS  (Issue #1122)
      #   env[4] = OTEL_EXPORTER_PROMETHEUS_HOST   (Issue #1122)
      #   env[5] = OTEL_EXPORTER_PROMETHEUS_PORT   (Issue #1122)
      #   env[6] = MY_FLAG       (extraEnv[0])
      #   env[7] = MY_SECRET_VAR (extraEnv[1])
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: NODE_NAME
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: HOST
      - equal:
          path: spec.template.spec.containers[0].env[2].name
          value: METRICS_LEGACY_HTTP_POST
      - equal:
          path: spec.template.spec.containers[0].env[6].name
          value: MY_FLAG
      - equal:
          path: spec.template.spec.containers[0].env[7].name
          value: MY_SECRET_VAR

  - it: appends extraEnvFrom entries after chart-managed envFrom sources
    set:
      app.secretKey: test-key
      extraEnvFrom:
        - secretRef:
            name: my-external-secrets
        - configMapRef:
            name: my-external-config
            optional: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-external-secrets
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-external-config
              optional: true
      # Order: chart-managed mcpgw-app-log-config is envFrom[0],
      # mcpgw-secret is envFrom[1]; user entries are last.
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: mcpgw-app-log-config
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: mcpgw-secret
      - equal:
          path: spec.template.spec.containers[0].envFrom[2].secretRef.name
          value: my-external-secrets
      - equal:
          path: spec.template.spec.containers[0].envFrom[3].configMapRef.name
          value: my-external-config

  - it: fails when extraEnv contains a reserved name (HOST)
    set:
      app.secretKey: test-key
      extraEnv:
        - name: HOST
          value: "1.2.3.4"
    asserts:
      - failedTemplate:
          errorPattern: "\"HOST\" is a reserved variable"

  - it: fails when extraEnv contains a reserved envFrom-sourced name (SECRET_KEY)
    set:
      app.secretKey: test-key
      extraEnv:
        - name: SECRET_KEY
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"SECRET_KEY\" is a reserved variable"

  - it: fails with a pointed OIDC_ENABLED error pointing to issue #895 and extraEnvFrom
    set:
      app.secretKey: test-key
      extraEnv:
        - name: OIDC_ENABLED
          value: "true"
    asserts:
      - failedTemplate:
          errorPattern: "OIDC is not currently configurable through chart values"

  - it: fails on duplicate names within extraEnv
    set:
      app.secretKey: test-key
      extraEnv:
        - name: MY_VAR
          value: "a"
        - name: MY_VAR
          value: "b"
    asserts:
      - failedTemplate:
          errorPattern: "duplicate name \"MY_VAR\""

  - it: fails when an extraEnv entry is missing the name field
    set:
      app.secretKey: test-key
      extraEnv:
        - value: "just-a-value"
    asserts:
      - failedTemplate:
          errorPattern: "missing required 'name' field"
