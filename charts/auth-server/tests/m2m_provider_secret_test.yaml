suite: m2m provider secret vars
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: emits Okta M2M allowed-audiences and client-groups when set
    set:
      app:
        secretKey: "test-key-not-for-prod"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"
      global:
        authProvider:
          type: okta
        ingress:
          routingMode: path
          tls: false
          paths:
            registry: /registry
      okta:
        domain: dev.okta.com
        clientId: cid
        clientSecret: csec
        m2mAllowedAudiences: "api://ai-registry"
        m2mClientGroups: '{"0oaEXAMPLECLIENTID":["public-mcp-users"]}'
    asserts:
      - equal:
          path: data.OKTA_M2M_ALLOWED_AUDIENCES
          value: "api://ai-registry"
          decodeBase64: true
      - equal:
          path: data.OKTA_M2M_CLIENT_GROUPS
          value: '{"0oaEXAMPLECLIENTID":["public-mcp-users"]}'
          decodeBase64: true

  - it: omits Okta M2M vars when unset (fail closed)
    set:
      app:
        secretKey: "test-key-not-for-prod"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"
      global:
        authProvider:
          type: okta
        ingress:
          routingMode: path
          tls: false
          paths:
            registry: /registry
      okta:
        domain: dev.okta.com
        clientId: cid
        clientSecret: csec
    asserts:
      - notExists:
          path: data.OKTA_M2M_ALLOWED_AUDIENCES
      - notExists:
          path: data.OKTA_M2M_CLIENT_GROUPS

  - it: emits Auth0 M2M client-groups when set
    set:
      app:
        secretKey: "test-key-not-for-prod"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"
      global:
        authProvider:
          type: auth0
        ingress:
          routingMode: path
          tls: false
          paths:
            registry: /registry
      auth0:
        domain: dev.us.auth0.com
        clientId: cid
        clientSecret: csec
        m2mClientGroups: '{"abc123clientid":["public-mcp-users"]}'
    asserts:
      - equal:
          path: data.AUTH0_M2M_CLIENT_GROUPS
          value: '{"abc123clientid":["public-mcp-users"]}'
          decodeBase64: true

  - it: omits Auth0 M2M client-groups when unset (fail closed)
    set:
      app:
        secretKey: "test-key-not-for-prod"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"
      global:
        authProvider:
          type: auth0
        ingress:
          routingMode: path
          tls: false
          paths:
            registry: /registry
      auth0:
        domain: dev.us.auth0.com
        clientId: cid
        clientSecret: csec
    asserts:
      - notExists:
          path: data.AUTH0_M2M_CLIENT_GROUPS
