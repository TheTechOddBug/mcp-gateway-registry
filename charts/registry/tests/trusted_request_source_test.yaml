suite: trusted request-source secret rendering
release:
  name: test
  namespace: default
templates:
  - templates/secret.yaml
tests:
  - it: renders TRUSTED_PROXY_HOPS default (1) when unset
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - equal:
          path: data.TRUSTED_PROXY_HOPS
          value: "1"
          decodeBase64: true

  - it: renders a raised TRUSTED_PROXY_HOPS when configured
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
        trustedProxyHops: 2
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - equal:
          path: data.TRUSTED_PROXY_HOPS
          value: "2"
          decodeBase64: true

  - it: omits TRUSTED_EXTERNAL_HOSTS when unset (fail closed to configured host)
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - notExists:
          path: data.TRUSTED_EXTERNAL_HOSTS

  - it: renders TRUSTED_EXTERNAL_HOSTS when configured
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
        trustedExternalHosts: "mcp.example.com,mcp.example.com:443"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - equal:
          path: data.TRUSTED_EXTERNAL_HOSTS
          value: "mcp.example.com,mcp.example.com:443"
          decodeBase64: true

  - it: omits TRUSTED_REAL_IP_CIDRS when unset (edge deploy, no realip rewrite)
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - notExists:
          path: data.TRUSTED_REAL_IP_CIDRS

  - it: renders TRUSTED_REAL_IP_CIDRS when configured
    set:
      app:
        secretKey: "test-key-not-for-prod"  # pragma: allowlist secret
        trustedRealIpCidrs: "10.0.0.0/16"
      egressAuth:
        markerSecret: "test-marker-not-for-prod"  # pragma: allowlist secret
    asserts:
      - equal:
          path: data.TRUSTED_REAL_IP_CIDRS
          value: "10.0.0.0/16"
          decodeBase64: true
