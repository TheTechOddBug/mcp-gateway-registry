# Nginx configuration directive for handling long server names
server_names_hash_bucket_size 128;

# Increase header buffer sizes for large OAuth tokens (Auth0, Entra ID)
large_client_header_buffers 4 32k;
proxy_buffer_size 16k;
proxy_buffers 4 16k;

# Variables hash configuration - needed for large number of auth_request_set variables
# With multiple location blocks each setting 5+ variables, we need larger hash tables
variables_hash_max_size 2048;
variables_hash_bucket_size 128;

# -----------------------------------------------------------------------------
# Inbound rate limiting (DoS protection for the shared /validate auth subrequest)
# -----------------------------------------------------------------------------
# Every authenticated /api/, Anthropic-API, A2A-agent and /mcp-proxy/ request
# fans out to a single internal `location = /validate` auth subrequest. Without
# an inbound cap, a flood of such requests exhausts /validate for every user.
# These zones are applied at the INBOUND edge locations (never on /validate
# itself) so the auth fan-out is naturally bounded while legitimate authenticated
# traffic is untouched.
#
# Keying: $binary_remote_addr is the connection peer AFTER nginx's realip module
# has run (POST_READ phase, before limit_req reads the key in PREACCESS). For
# compose/direct-exposure deployments the peer already IS the client, so these
# zones limit per client IP directly. Behind an ALB/CloudFront (ECS) the raw peer
# is the load balancer, so set TRUSTED_REAL_IP_CIDRS to the VPC CIDR (see the
# realip block below): nginx then rewrites the peer to the real client from
# X-Forwarded-For and these zones limit per client IP in that topology too. If
# TRUSTED_REAL_IP_CIDRS is left unset behind an ALB, every request shares the
# balancer's IP and these zones collapse to a single global cap on the fan-out
# (which still bounds /validate but cannot isolate one abusive client). The
# Terraform WAF (enable_waf=true) is optional defense-in-depth (AWS managed rule
# sets + its own rate rules); it is off by default as a cost decision and is not
# required for per-client-IP limiting once TRUSTED_REAL_IP_CIDRS is set.
#
# Tuning: raise `rate`/`burst` if a legitimate bursty client (e.g. a dashboard
# firing many parallel calls) is throttled; the 429 is logged to the nginx error
# log with "limiting requests". zone size 10m holds ~160k distinct source IPs.
#
# - mcp_gateway_edge: general inbound API/proxy edge, generous for normal use.
# - mcp_gateway_register: stricter cap for the rare server-registration calls,
#   which each trigger DB writes + search-index churn + a security-scan task.
# - mcp_gateway_conn: concurrent-connection cap (bounds simultaneous fan-out).
limit_req_zone $binary_remote_addr zone=mcp_gateway_edge:10m rate=50r/s;
limit_req_zone $mcp_gateway_register_key zone=mcp_gateway_register:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=mcp_gateway_conn:10m;

# Return 429 (Too Many Requests) rather than the default 503 when a limit trips,
# so clients can back off correctly.
limit_req_status 429;
limit_conn_status 429;

# Classify server-registration requests so they get the stricter zone above. The
# key is empty (rate limiting skipped) for every non-registration request, so the
# stricter limit only ever applies to the registration endpoints. Matches both
# ROOT_PATH-prefixed and bare paths; anchored so it cannot be bypassed by suffix.
map $uri $mcp_gateway_register_key {
    default                              "";
    "~*/api/register/?$"                 $binary_remote_addr;
    "~*/api/servers/register/?$"         $binary_remote_addr;
    "~*/api/internal/register/?$"        $binary_remote_addr;
}

# Lua shared dictionary for metrics collection (10MB)
lua_shared_dict metrics_buffer 10m;

# Lua shared dictionary for virtual server routing mappings (2MB)
lua_shared_dict virtual_server_map 2m;

# Background flush of metrics buffer to metrics-service
init_worker_by_lua_file /etc/nginx/lua/flush_metrics.lua;

# Trusted real-IP CIDRs (rendered from TRUSTED_REAL_IP_CIDRS; empty by default).
# When set, nginx recovers the real client IP from X-Forwarded-For for connections
# whose immediate peer falls in one of these CIDRs (e.g. an ALB in the VPC), so the
# audited client_ip is the end user rather than the load balancer's internal IP.
# real_ip_recursive walks the chain right-to-left skipping trusted CIDRs, so it is
# correct for stacked proxies (e.g. CloudFront in front of an ALB) too. A spoofed
# left-most entry can never win because it is not appended by a trusted hop.
# Emitted empty for edge deployments (compose / single host) where nginx's peer IS
# the client and no rewrite is needed.
{{REAL_IP_CONFIG}}

# Map to determine the real client scheme
# Uses X-Forwarded-Proto from ALB/load balancer if present, otherwise falls back to $scheme
# This is critical for OAuth2 redirect URIs when HTTPS termination happens at the ALB
map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
    http    http;
}

# Map to determine the real client port
# Uses X-Forwarded-Port from ALB/load balancer if present, otherwise maps internal
# container ports (8080/8443) to their standard external equivalents (80/443)
# This is critical for Keycloak URL generation when running behind a reverse proxy
map $http_x_forwarded_port $real_port {
    default         $http_x_forwarded_port;
    ""              $standard_port;
}

# Map internal container listen ports to standard external ports
map $server_port $standard_port {
    8080    80;
    8443    443;
    default $server_port;
}

# Declare $backend_url at http scope with an empty default. It is referenced in the
# shared `location = /validate` block but only `set` inside the generated /mcp-proxy/
# location blocks. When no such block renders (no healthy MCP server, or registry-only
# mode), the `$backend_url` reference would otherwise be an UNKNOWN variable and nginx
# fails to start with `[emerg] unknown "backend_url" variable`. A `map` default declares
# the variable globally; a location-level `set $backend_url ...` overrides it per-request.
# Unlike a server-scope `set` (which the auth_request subrequest re-runs and clobbers), a
# map is evaluated lazily and is NOT clobbered -- safe for the /validate subrequest.
map $host $backend_url {
    default "";
}

# Declare $registry_api_auth at http scope (same rationale as $backend_url above): it is
# referenced in the shared /validate block but only `set` inside the /api/ location blocks,
# so without a default declaration nginx fails to start on requests that render no /api/ block.
map $host $registry_api_auth {
    default "";
}

# Declare $mcp_resource_metadata at http scope (same rationale as $backend_url):
# @auth_error references it for the WWW-Authenticate resource_metadata. The map
# default is the gateway-wide PRM URL; obo_exchange location blocks override it
# with a `set $mcp_resource_metadata "<per-server PRM>";` so MCP clients discover
# the per-server resource. map is not clobbered by the /validate subrequest.
map $host $mcp_resource_metadata {
    default "{{MCP_RESOURCE_METADATA_URL}}";
}

# Rate-limit passthrough (issue #295). The auth-server signals an application-level
# throttle on the /validate subrequest as a 403 carrying X-RateLimit-* headers
# (nginx auth_request only forwards 401/403; a 429 would become a 500). The
# data-plane location blocks capture those headers via `auth_request_set $rl_*`,
# and @forbidden_error rewrites the 403 into a real 429 when $rl_throttled is "1".
# These maps declare the vars at http scope with an empty default so locations that
# do NOT capture them (registry-only mode, /api/, control-plane) still resolve the
# references in @forbidden_error -- same rationale as $backend_url above. A
# per-location `auth_request_set` overrides the map default for that request.
map $host $rl_throttled {
    default "";
}
map $host $rl_limit {
    default "";
}
map $host $rl_reset {
    default "";
}
map $host $rl_retry {
    default "";
}

{{VERSION_MAP}}
# First server block now directly handles HTTP requests instead of redirecting
server {
    listen 8080;
    # {{ADDITIONAL_SERVER_NAMES}} is replaced with custom domains/IPs for gateway access
    server_name localhost {{ADDITIONAL_SERVER_NAMES}};

    # NOTE: do NOT add a server-scope `set $backend_url "";` default here.
    # nginx auth_request creates the /validate subrequest via
    # ngx_http_subrequest(), which sets sr->variables = r->variables -- the
    # subrequest shares the parent's variable array by pointer. The subrequest
    # then re-runs the full pipeline including the SERVER-level rewrite phase,
    # so a server-scope `set $backend_url ""` executes during the subrequest
    # and mutates the shared array, clobbering the value the parent's
    # /mcp-proxy/ location already wrote. /validate then forwards an empty
    # X-Resolved-Upstream, _attach_mcp_proxy_token() short-circuits, no
    # X-Internal-Token is minted, and mcp_proxy 401s every MCP call with
    # "Missing internal proxy token". $backend_url is set ONLY inside the
    # generated /mcp-proxy/ location blocks. Non-MCP locations that share
    # /validate (e.g. /api/) forward the map default (empty) for $backend_url.
    #
    # $backend_url MUST be declared at http scope via `map $host $backend_url { default ""; }`
    # near the top of this file. Without that declaration, when no /mcp-proxy/ block renders
    # (no healthy MCP server / registry-only mode), the `$backend_url` reference in /validate
    # is an UNKNOWN variable and nginx fails to start with `[emerg] unknown "backend_url"
    # variable`. The map is clobber-safe (evaluated lazily, not re-run in the subrequest
    # rewrite phase like a server `set`); a location `set $backend_url ...` still overrides
    # the map default per-request.

    # Custom error page for 502 Bad Gateway (shown during backend startup)
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Add this to trigger the named location for 403 errors
    error_page 403 = @forbidden_error;

    # Registered MCP server locations (generated dynamically)
{{LOCATION_BLOCKS}}

    # Registered A2A agent reverse-proxy locations (generated dynamically)
{{AGENT_LOCATION_BLOCKS}}

{{REGISTRY_ONLY_BLOCK}}

    # Internal session management for virtual MCP server router.
    # `internal;` blocks external access to this location; the
    # X-Internal-Secret header (the shared SECRET_KEY, read from the nginx
    # worker env so it never lands in the rendered conf) lets the FastAPI
    # handler reject any request that reaches /api/internal/sessions/* by a
    # path other than this trusted subrequest (e.g. direct-to-7860).
    location /_internal/sessions/ {
        internal;
        set_by_lua_block $internal_session_secret { return os.getenv("SECRET_KEY") or "" }
        proxy_pass http://127.0.0.1:7860/api/internal/sessions/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Internal-Secret $internal_session_secret;
    }

    # Egress-token vend endpoint (per-user credential vault). The registry app
    # binds loopback, so auth_server reaches it through nginx. Deliberately NOT
    # under /api/ (which applies auth_request /validate and would reject the
    # service-token call) and NOT `internal;` (auth_server is a genuine
    # cross-container client). Gated by validate_internal_auth (mcp-registry
    # service JWT) + the re-verified X-Internal-Token at the app, so a caller
    # without SECRET_KEY cannot use it.
    location = /_egress_internal/egress-token {
        proxy_pass http://127.0.0.1:7860/api/internal/egress-token;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
    }

    # Virtual MCP server locations (generated dynamically)
{{VIRTUAL_SERVER_BLOCKS}}

    # Serve static files directly from nginx (more efficient than proxying)
    location /static/ {
        alias /app/frontend/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /app/frontend/build/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Route for Cost Explorer service
    location / {
        proxy_pass http://127.0.0.1:7860/;
        # Strip any client-supplied internal-session secret. This catch-all
        # proxies to the app for everything not matched by a more specific
        # location, which includes /api/internal/sessions/* when ROOT_PATH is
        # non-empty (a bare /api/... request does not match {{ROOT_PATH}}/api/).
        # The header must only ever originate from the trusted
        # /_internal/sessions/ subrequest, so never let a client value cross
        # this boundary either.
        proxy_set_header X-Internal-Secret "";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }

    # Auth validation endpoint - passes entire request to auth server
    location = /validate {
        internal;

        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/validate;

        # Pass original request info
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$host$request_uri;

        # Forward the resolved MCP upstream (set in the /mcp-proxy/ block's rewrite
        # phase, empty elsewhere) so /validate can bind it into the internal token.
        proxy_set_header X-Resolved-Upstream $backend_url;

        # Egress marker: force-set the shared secret so auth_server knows
        # this /validate subrequest came from nginx (not a direct :8888 caller).
        # proxy_set_header REPLACES any client-supplied X-Validate-Source-Secret.
        proxy_set_header X-Validate-Source-Secret "{{NGINX_MARKER_SECRET}}";

        # Forward the registry-API marker (set in the /api/ blocks' rewrite phase,
        # empty elsewhere) so /validate mints the registry-UI internal token.
        proxy_set_header X-Registry-Api-Auth $registry_api_auth;

        # Extract and pass Cognito config headers from original request
        proxy_set_header X-User-Pool-Id $http_x_user_pool_id;
        proxy_set_header X-Client-Id $http_x_client_id;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Authorization $http_x_authorization;

        # Overwrite the client-supplied source headers with nginx's own view of
        # the peer. An auth_request subrequest does NOT inherit the parent
        # location's proxy_set_header directives, and proxy_pass_request_headers
        # below forwards the ORIGINAL client headers verbatim -- so without these
        # two lines a client could send X-Real-IP: 8.8.8.8 and have it recorded as
        # the source in the auth-server MCP access audit (get_client_ip prefers
        # X-Real-IP). $remote_addr honours the realip module (set_real_ip_from),
        # so this is the real client behind a trusted proxy and non-spoofable
        # otherwise. (proxy_set_header overrides the forwarded client header
        # declaratively regardless of its position relative to
        # proxy_pass_request_headers on.)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Pass all original headers (including Authorization and X-Body from Lua)
        proxy_pass_request_headers on;

        # Short timeouts for auth validation
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Egress credential vault OAuth callback (per-user 3LO). Goes to the REGISTRY
    # (not auth-server), and has NO auth_request /validate -- the signed+encrypted
    # state is the authority. Exact match so it wins over /oauth2/callback/*.
    location = /oauth2/egress/callback {
        proxy_pass http://127.0.0.1:7860/api/oauth2/egress/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;
    }

    # Egress consent (MCP URL-mode elicitation). The connect front door
    #   /oauth2/egress/connect
    # is served by the REGISTRY and rides the catch-all `location /` above
    # (mounted at root, no /api prefix). It needs no dedicated block.
    #
    # INVARIANT: do NOT enable `proxy_intercept_errors on;` (it is off by
    # default). The egress consent response is an UPSTREAM response from the
    # auth-server mcp_proxy hop (emitted AFTER /validate already returned 200 --
    # the user is authenticated but lacks the third-party token). With intercept
    # off, that response passes through to the client untouched. Turning
    # intercept on would route upstream 4xx through @auth_error and overwrite the
    # body the elicitation flow depends on.

    # OAuth2 Cognito callback endpoint
    location /oauth2/callback/cognito {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/callback/cognito;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Pass through all headers for OAuth2 flow
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    # OAuth2 Cognito login endpoint
    location /oauth2/login/cognito {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/login/cognito;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Pass through query parameters and headers
        proxy_pass_request_headers on;
    }

    # OAuth2 logout is no longer browser-facing (issue #1503). The registry
    # calls auth-server's /oauth2/logout/ directly over the internal network
    # (AUTH_SERVER_URL) and redirects the browser straight to the IdP, so the
    # id_token_hint JWT never traverses this public hop. Return 404 to close
    # the path that would otherwise let a crafted request reintroduce the JWT
    # into a browser-facing URL and any proxy/WAF/access logs.
    location /oauth2/logout/ {
        return 404;
    }

    # OAuth2 Entra ID callback endpoint
    location /oauth2/callback/entra {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/callback/entra;
