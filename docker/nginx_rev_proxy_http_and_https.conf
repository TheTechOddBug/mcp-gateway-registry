    # {{KEYCLOAK_LOCATIONS_END}}

    # Anthropic MCP Registry API {{ANTHROPIC_API_VERSION}} - Public REST API with JWT authentication (HTTPS)
    location {{ROOT_PATH}}/{{ANTHROPIC_API_VERSION}}/ {
        # Inbound rate limiting: bound the /validate auth fan-out (see zones above).
        limit_req zone=mcp_gateway_edge burst=100 nodelay;
        limit_conn mcp_gateway_conn 100;

        # Mark this as a registry-API request (rewrite phase) so the shared
        # /validate subrequest forwards X-Registry-Api-Auth and /validate mints the
        # registry-UI internal token. Set inside the location (NOT a server-scope
        # default), which the auth_request subrequest would clobber.
        set $registry_api_auth "1";

        # Authenticate request via auth server (validates JWT Bearer tokens)
        auth_request /validate;

        # Capture auth server response headers
        auth_request_set $auth_user $upstream_http_x_user;
        auth_request_set $auth_username $upstream_http_x_username;
        auth_request_set $auth_client_id $upstream_http_x_client_id;
        auth_request_set $auth_scopes $upstream_http_x_scopes;
        auth_request_set $auth_method $upstream_http_x_auth_method;
        # Capture the /validate-minted registry-UI token (binds verified identity).
        # The registry verifies this instead of trusting the forgeable X-* headers.
        auth_request_set $auth_internal_token_registry $upstream_http_x_internal_token_registry;
        auth_request_set $auth_groups $upstream_http_x_groups;

        # Proxy to registry service
        proxy_pass http://127.0.0.1:7860/{{ANTHROPIC_API_VERSION}}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Forward validated auth context to FastAPI
        proxy_set_header X-User $auth_user;
        proxy_set_header X-Username $auth_username;
        proxy_set_header X-Client-Id $auth_client_id;
        proxy_set_header X-Scopes $auth_scopes;
        proxy_set_header X-Auth-Method $auth_method;
        # The internal token the registry verifies (it ignores the X-* headers above).
        proxy_set_header X-Internal-Token-Registry $auth_internal_token_registry;
        proxy_set_header X-Groups $auth_groups;

        # Pass through original Authorization header
        proxy_set_header Authorization $http_authorization;

        # Pass all request headers
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Handle auth errors
        error_page 401 = @auth_error;
        error_page 403 = @forbidden_error;

        # CORS headers (for programmatic browser clients using Bearer tokens).
        # This endpoint authenticates via the Authorization header (auth_request
        # /validate), NOT via cookies, so credentialed CORS is intentionally NOT
        # enabled here: a wildcard origin ('*') combined with
        # Access-Control-Allow-Credentials would let any site make
        # cookie-bearing cross-origin requests. Cookie-authenticated,
        # exact-origin CORS is enforced by the registry application itself
        # (CORS_ALLOWED_ORIGINS). Do NOT re-add Allow-Credentials with '*'.
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-User-Pool-Id, X-Client-Id, X-Region, X-Authorization' always;

        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # A2A Agent API - Internal API with JWT authentication (HTTPS)
